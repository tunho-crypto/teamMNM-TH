{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP - Bách hóa XANH</title>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        .auth-switch-links {
            margin-top: 20px;
            display: grid;
            gap: 12px;
        }
        .auth-switch-card {
            padding: 14px 16px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 14px;
            background: #f8fafc;
            text-align: center;
        }
        .auth-switch-card p {
            margin: 0 0 8px;
            color: #475569;
            font-size: 14px;
        }
        /* Style lại nút Gửi mã cho giống link xanh của sếp */
        .auth-switch-card button {
            color: #15803d;
            font-weight: 700;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-size: 14px;
        }
        .auth-switch-card button:hover {
            text-decoration: underline;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background-color: #008a37;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 15px;
        }
        /* Căn giữa ô nhập OTP cho đẹp */
        .otp-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<section class="auth-page">
    <div class="container">
        <div class="auth-box">
            <div class="auth-left">
                <span class="auth-tag">BHX Store</span>
                <h1>Xác thực Email</h1>
            </div>

            <div class="auth-right">
                <h2>Nhập mã OTP</h2>
                <p class="auth-subtitle">Mã gồm 6 chữ số đã được gửi tới:<br><strong style="color: #008a37;">{{ email }}</strong></p>

                {% if error %}
                    <div class="auth-alert auth-alert-error">{{ error }}</div>
                {% endif %}

                {% if success %}
                    <div class="auth-alert auth-alert-success">{{ success }}</div>
                {% endif %}

                <form method="post" class="auth-form">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="otp_code">Mã OTP (6 số)</label>
                        <input type="text" id="otp_code" name="otp_code" class="otp-input" placeholder="------" maxlength="6" required autocomplete="off" autofocus>
                    </div>

                    <button type="submit" class="auth-btn">Xác nhận mã OTP</button>
                </form>

                <div class="auth-switch-links">
                    <div class="auth-switch-card">
                        <p>Chưa nhận được mã?</p>
                        <form method="post" action="{% url 'store:resend_otp' %}" style="margin: 0;">
                            {% csrf_token %}
                            <button type="submit">Gửi lại mã OTP ngay</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
