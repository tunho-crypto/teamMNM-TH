{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - Bách hóa XANH</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<section class="auth-page">
    <div class="container">
        <div class="auth-box">
            <div class="auth-left">
                <span class="auth-tag">BHX Store</span>
                <h1>Tìm lại mật khẩu</h1>
                <p style="color: white; margin-top: 15px; opacity: 0.9;">Đừng lo lắng, chúng tôi sẽ giúp bạn lấy lại quyền truy cập vào tài khoản.</p>
            </div>
            <div class="auth-right">
                <h2>Quên mật khẩu</h2>
                <p class="auth-subtitle">Nhập email của bạn để nhận mã OTP khôi phục.</p>

                {% if error %}
                    <div class="auth-alert auth-alert-error">{{ error }}</div>
                {% endif %}

                <form method="post" class="auth-form">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="email">Địa chỉ Email</label>
                        <input type="email" id="email" name="email" placeholder="Nhập email đã đăng ký..." required autofocus>
                    </div>
                    <button type="submit" class="auth-btn" style="width: 100%; padding: 14px; background: #008a37; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Gửi mã xác nhận</button>
                </form>
                
                <div style="text-align: center; margin-top: 20px;">
                    <a href="{% url 'store:login_email' %}" style="color: #008a37; font-weight: bold; text-decoration: none;">← Quay lại đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
