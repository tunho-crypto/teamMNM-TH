
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng thành công</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef1f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 420px;
        }
        .icon {
            font-size: 56px;
            color: #16a34a;
            margin-bottom: 16px;
        }
        h1 {
            margin: 0 0 10px;
            color: #22314d;
        }
        p {
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            padding: 12px 22px;
            background: #8cc12e;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">✓</div>
        <h1>Đặt hàng thành công</h1>
        <p>
            Đơn hàng của bạn đã được ghi nhận.
            {% if last_order_id %}
                <br>Mã đơn hàng: <strong>#{{ last_order_id }}</strong>
            {% endif %}
        </p>
        <a href="{% url 'store:home' %}" class="btn">Quay về trang chủ</a>
    </div>
</body>
</html>
