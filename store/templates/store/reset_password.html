{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu - Bách hóa XANH</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<section class="auth-page">
    <div class="container">
        <div class="auth-box">
            <div class="auth-left">
                <span class="auth-tag">BHX Store</span>
                <h1>Tạo mật khẩu mới</h1>
            </div>
            <div class="auth-right">
                <h2>Bảo mật tài khoản</h2>
                <p class="auth-subtitle">Mã xác thực đã được gửi đến: <strong style="color: #008a37;">{{ email }}</strong></p>

                {% if error %}
                    <div class="auth-alert auth-alert-error">{{ error }}</div>
                {% endif %}

                <form method="post" class="auth-form">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Mã OTP (6 số)</label>
                        <input type="text" name="otp_code" placeholder="------" maxlength="6" required style="letter-spacing: 5px; text-align: center; font-weight: bold; font-size: 18px;">
                    </div>
                    <!-- Cụm nhập Mật khẩu mới -->
<div style="margin-bottom: 20px;">
    <label style="font-weight: bold; color: #333;">Mật khẩu mới:</label>
    <div style="position: relative; margin-top: 5px;">
        <input type="password" id="new_password" name="new_password" required 
               style="width: 100%; padding: 12px; padding-right: 45px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
        <span onclick="togglePassword('new_password', this)" 
              style="position: absolute; right: 15px; top: 12px; cursor: pointer; font-size: 18px; color: #64748b;">
            👁️
        </span>
    </div>
</div>

<!-- Cụm nhập Xác nhận mật khẩu -->
<div style="margin-bottom: 20px;">
    <label style="font-weight: bold; color: #333;">Xác nhận mật khẩu:</label>
    <div style="position: relative; margin-top: 5px;">
        <input type="password" id="confirm_password" name="confirm_password" required 
               style="width: 100%; padding: 12px; padding-right: 45px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
        <span onclick="togglePassword('confirm_password', this)" 
              style="position: absolute; right: 15px; top: 12px; cursor: pointer; font-size: 18px; color: #64748b;">
            👁️
        </span>
    </div>
</div>

<!-- Script nhỏ gọn bật tắt con mắt -->
<script>
function togglePassword(inputId, eyeIcon) {
    var input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        eyeIcon.innerText = "🙈"; // Đổi thành icon nhắm mắt
    } else {
        input.type = "password";
        eyeIcon.innerText = "👁️"; // Đổi lại icon mở mắt
    }
}
</script>
                    
                    <button type="submit" class="auth-btn" style="width: 100%; padding: 14px; background: #008a37; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;">Lưu mật khẩu mới</button>
                </form>
            </div>
        </div>
    </div>
</section>
</body>
</html>
