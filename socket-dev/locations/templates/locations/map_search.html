{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Bản đồ Bách Hóa Xanh</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        .custom-navbar { background-color: #008a37; padding: 15px 20px; display: flex; gap: 20px; }
        .custom-navbar a { color: white; text-decoration: none; font-weight: bold; font-size: 16px; }
        .custom-navbar a:hover { text-decoration: underline; }

        .control-bar { background-color: #f8f9fa; padding: 10px 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; border-bottom: 1px solid #ddd; z-index: 1000; }

        /* Khung chứa ô tìm kiếm (Cần relative để cái danh sách xổ xuống nằm đúng chỗ) */
        .search-container { position: relative; display: flex; flex-grow: 1; min-width: 250px; }
        .search-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px 0 0 4px; outline: none; }
        .search-btn { padding: 10px 15px; color: white; border: none; border-radius: 0 4px 4px 0; cursor: pointer; font-weight: bold; white-space: nowrap; }
        
        /* Giao diện danh sách gợi ý địa chỉ */
        .suggestions-list {
            position: absolute; top: 100%; left: 0; right: 50px; background: white;
            border: 1px solid #ccc; max-height: 250px; overflow-y: auto;
            list-style: none; padding: 0; margin: 0; z-index: 2000; display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 0 0 4px 4px;
        }
        .suggestions-list li { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        .suggestions-list li:hover { background-color: #e6f7ff; color: #0050b3; }

        .btn-nearest { background-color: #ffe100; color: #d8232a; border: none; padding: 10px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        #map { flex-grow: 1; width: 100%; z-index: 1; }
        .leaflet-routing-container { display: none !important; }
        .popup-actions { display: flex; gap: 5px; margin-top: 10px; }
        .popup-btn { flex: 1; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 4px; font-weight: bold; text-align: center; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="custom-navbar">
        <a href="{% url 'map_search' %}">🗺️ BẢN ĐỒ</a>
        <a href="{% url 'store_list' %}">📋 DANH SÁCH CỬA HÀNG</a>
    </div>

    <div class="control-bar">
        <div class="search-container">
            <input type="text" id="user-location-input" class="search-input" placeholder="Nhập địa chỉ (VD: Lê Lợi, Quận 1)..." oninput="goiYDiaChi(this.value)">
            <ul id="address-suggestions" class="suggestions-list"></ul>
            <button class="search-btn" style="background-color: #0078FF;" onclick="timViTriTuNhap()">📍 Đặt</button>
        </div>

        <div class="search-container">
            <input type="text" id="keyword" class="search-input" placeholder="Tìm tên Bách Hóa Xanh...">
            <button class="search-btn" style="background-color: #008a37;" onclick="timKiemVaChiDuong()">🔍 Tìm & Đi</button>
        </div>

        <button class="btn-nearest" onclick="layViTriNguoiDung(timCuaHangGanNhat)">📡 Dùng GPS</button>
    </div>

    <div id="status-bar" style="background: #e6f7ff; padding: 5px 20px; font-size: 0.9em; display:none;"></div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7769, 106.7009], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var stores = {{ stores_json|safe }};
        var userLatLng = null;
        var routingControl = null;
        var userMarker = null;

        // Dùng thẳng Logo Bách Hóa Xanh làm mốc đánh dấu
        // Dùng ghim màu Xanh lá cây (Green) đặc trưng của BHX
       // Tạo Icon Cửa Hàng chuẩn xịn bằng CSS (Màu xanh BHX + Giỏ hàng)
        var storeIcon = L.divIcon({
            html: `
                <div style="
                    background-color: #008a37; 
                    width: 32px; 
                    height: 32px; 
                    border-radius: 50% 50% 50% 0; 
                    transform: rotate(-45deg); 
                    border: 2px solid white; 
                    box-shadow: -2px 2px 5px rgba(0,0,0,0.4);
                    display: flex; 
                    align-items: center; 
                    justify-content: center;
                ">
                    <span style="transform: rotate(45deg); font-size: 16px;">🛒</span>
                </div>
            `,
            className: '', // Quan trọng: Tắt viền trắng hình vuông mặc định của Leaflet
            iconSize: [36, 36],      // Kích thước tổng thể
            iconAnchor: [18, 36],    // Góc nhọn dưới cùng sẽ cắm chính xác vào tọa độ
            popupAnchor: [0, -36]    // Bảng thông tin nổi lên từ đỉnh ghim
        });

        stores.forEach(st => {
            st.markerObj = L.marker([st.lat, st.lon], {icon: storeIcon}).addTo(map);
            capNhatPopup(st, null);
        });

        function capNhatPopup(store, distanceKm) {
            var distHtml = distanceKm ? `<br><b>📍 Cách bạn: ${distanceKm} km</b>` : ``;
            var content = `
                <div style="text-align:center">
                    <b style="color:#008a37; font-size: 1.1em">${store.ten}</b><br>
                    <small>${store.dia_chi}</small>${distHtml}
                    <div class="popup-actions">
                        <button class="popup-btn" style="background-color: #008a37;" onclick="xuLyChiDuong(${store.lat}, ${store.lon}, '${store.ten}')">🚗 Chỉ đường</button>
                        <a href="/locations/chi-tiet/${store.id}/" class="popup-btn" style="background-color: #f39c12;">ℹ️ Chi tiết</a>
                    </div>
                </div>`;
            store.markerObj.bindPopup(content);
        }

        // --- TÍNH NĂNG GỢI Ý ĐỊA CHỈ KHI GÕ ---
        var timeoutId = null;
        function goiYDiaChi(text) {
            clearTimeout(timeoutId);
            var list = document.getElementById('address-suggestions');

            // Nếu xóa hết hoặc gõ chưa đủ 3 ký tự thì ẩn danh sách đi
            if (text.trim().length < 3) {
                list.style.display = 'none';
                return;
            }

            // Đợi 0.6 giây sau khi ngừng gõ mới gọi API để tránh bị chặn
            timeoutId = setTimeout(() => {
                // Thêm countrycodes=vn để chỉ tìm ở Việt Nam
                var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(text)}&countrycodes=vn&limit=5`;
                
                fetch(url).then(r => r.json()).then(data => {
                    list.innerHTML = ''; // Xóa kết quả cũ
                    if (data.length > 0) {
                        data.forEach(item => {
                            var li = document.createElement('li');
                            li.innerText = item.display_name;
                            // Khi click vào 1 dòng gợi ý
                            li.onclick = function() {
                                document.getElementById('user-location-input').value = item.display_name;
                                list.style.display = 'none';
                                capNhatViTriUser(parseFloat(item.lat), parseFloat(item.lon));
                                map.setView([parseFloat(item.lat), parseFloat(item.lon)], 15);
                                hienThongBao(`✅ Đã cắm mốc tại: ${item.display_name}`);
                            };
                            list.appendChild(li);
                        });
                        list.style.display = 'block';
                    } else {
                        list.style.display = 'none';
                    }
                }).catch(e => console.error("Lỗi lấy gợi ý:", e));
            }, 600); 
        }

        // Ẩn danh sách gợi ý khi bấm chuột ra chỗ khác trên màn hình
        document.addEventListener('click', function(e) {
            if (e.target.id !== 'user-location-input') {
                document.getElementById('address-suggestions').style.display = 'none';
            }
        });

        // Nút bấm "Đặt vị trí" thủ công (đề phòng click trượt)
        function timViTriTuNhap() {
            var address = document.getElementById('user-location-input').value;
            if (!address) { alert("Vui lòng nhập địa chỉ của bạn trước!"); return; }
            hienThongBao("⏳ Đang dò tìm...");
            var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&countrycodes=vn&limit=1`;
            fetch(url).then(r => r.json()).then(data => {
                if (data.length > 0) {
                    capNhatViTriUser(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 15);
                    hienThongBao(`✅ Đã cắm mốc tại: ${data[0].display_name}`);
                } else alert("Không tìm thấy địa chỉ này!");
            });
        }

        // --- CÁC HÀM XỬ LÝ BẢN ĐỒ CÒN LẠI ---
        function layViTriNguoiDung(callback) {
            hienThongBao("⏳ Đang định vị GPS...");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => { capNhatViTriUser(pos.coords.latitude, pos.coords.longitude); if(callback) callback(); },
                    err => { alert("Lỗi GPS. Tạm đặt ở trung tâm."); capNhatViTriUser(10.7721, 106.6983); },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            }
        }

        function capNhatViTriUser(lat, lon) {
            userLatLng = L.latLng(lat, lon);
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(userLatLng, {draggable: true}).addTo(map);
            userMarker.bindPopup("<b>Vị trí của bạn</b><br><i>(Kéo thả để dời đi)</i>").openPopup();
            
            stores.forEach(st => capNhatPopup(st, (userLatLng.distanceTo(L.latLng(st.lat, st.lon)) / 1000).toFixed(2)));

            userMarker.on('dragend', function() {
                userLatLng = userMarker.getLatLng();
                stores.forEach(st => capNhatPopup(st, (userLatLng.distanceTo(L.latLng(st.lat, st.lon)) / 1000).toFixed(2)));
                if (routingControl) veDuong(routingControl.getWaypoints()[1].latLng, "Cửa hàng đang chọn");
            });
        }

        function xuLyChiDuong(lat, lon, tenStore) {
            if (!userLatLng) alert("Bạn chưa có vị trí! Vui lòng nhập địa chỉ hoặc bật GPS.");
            else veDuong(L.latLng(lat, lon), tenStore);
        }

        function veDuong(destLatLng, tenStore) {
            if (routingControl) map.removeControl(routingControl);
            hienThongBao(`🚗 Đang dẫn đường tới: <b>${tenStore}</b>`);
            routingControl = L.Routing.control({
                waypoints: [userLatLng, destLatLng], createMarker: () => null,
                lineOptions: { styles: [{color: 'blue', opacity: 0.7, weight: 6}] }, fitSelectedRoutes: true
            }).addTo(map);
        }

        function timCuaHangGanNhat() {
            if (!userLatLng) return;
            var nearest = stores.reduce((prev, curr) => (userLatLng.distanceTo(L.latLng(curr.lat, curr.lon)) < userLatLng.distanceTo(L.latLng(prev.lat, prev.lon)) ? curr : prev));
            veDuong(L.latLng(nearest.lat, nearest.lon), nearest.ten);
            nearest.markerObj.openPopup();
        }

        function timKiemVaChiDuong() {
            var k = document.getElementById('keyword').value.toLowerCase();
            var f = stores.find(st => st.ten.toLowerCase().includes(k));
            if (f) {
                if(userLatLng) veDuong(L.latLng(f.lat, f.lon), f.ten); else map.setView([f.lat, f.lon], 15);
                f.markerObj.openPopup();
            } else alert("Không tìm thấy!");
        }

        function hienThongBao(msg) {
            var bar = document.getElementById('status-bar'); bar.style.display = 'block'; bar.innerHTML = msg;
        }

        layViTriNguoiDung();
    </script>
</body>
</html>
